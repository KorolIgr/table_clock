<!DOCTYPE html>
<html>
<head>
    <title>Table Clock - WiFi Station</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/normalize.css">
    <link rel="stylesheet" href="/css/skeleton.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="twelve columns">
                <h1>WiFi Station Settings</h1>
                
                <div id="nav"></div>
                
                <div class="wifi-sta-settings">
                    <form action="/wifi_sta" method="post">
                        <div class="row">
                            <div class="six columns">
                                <label for="ssid">Network:</label>
                                <select class="u-full-width" id="ssid" name="ssid">
                                    <option value="">Select Network</option>
                                </select>
                            </div>
                            
                            <div class="six columns">
                                <label>&nbsp;</label>
                                <button class="button u-full-width" type="button" onclick="scanNetworks()">Refresh Networks</button>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="six columns">
                                <label for="password">Password:</label>
                                <input class="u-full-width" type="password" id="password" name="password" placeholder="Enter Password">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="six columns">
                                <input class="button-primary u-full-width" type="submit" value="Connect">
                            </div>
                            
                            <div class="six columns">
                                <button class="button u-full-width" type="button" onclick="forgetWifi()">Forget Network</button>
                            </div>
                        </div>
                    </form>
                    
                    <div class="status-area">
                        <p id="status"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>

<script src="/js/nav.js"></script>

<script>

    function scanNetworks() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/wifi_sta/scan', true);

        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                var networks = JSON.parse(xhr.responseText);

                var select = document.getElementById('ssid');
                select.innerHTML = '<option value="">Select Network</option>';

                networks.forEach(function(net) {
                    var option = document.createElement('option');

                    option.value = net.ssid;

                    // Display network name with signal strength and security indicator
                    option.text = net.ssid + ' (' + net.rssi + ' dBm)' + (net.secure ? ' 🔒' : '');

                    select.appendChild(option);
                });
            }
        };

        xhr.send();
    }

    function forgetWifi() {
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/wifi_sta/forget', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                document.getElementById('status').innerText = 'Credentials forgotten. Device will disconnect.';
                document.getElementById('password').value = '';
            }
        };
        xhr.send();
    }

</script>
