<!DOCTYPE html>
<html>
<head>
    <title>Table Clock - WiFi AP</title>
</head>
<body>
    <h1>WiFi AP</h1>
    <form action="/wifi_ap" method="post">
        <label for="ssid">SSID:</label>
        <input type="text" id="ssid" name="ssid" placeholder="Enter SSID"><br><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter Password"><br><br>
        
        <label for="ip">IP:</label>
        <input type="text" id="ip" name="ip" placeholder="192.168.4.1" value="192.168.4.1"><br><br>
        
        <input type="submit" value="Save">
    </form>
</body>
</html>
