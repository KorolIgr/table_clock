<!DOCTYPE html>
<html>
<head>
    <title>Table Clock - LED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/normalize.css">
    <link rel="stylesheet" href="/css/skeleton.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="twelve columns">
                <h1>LED Settings</h1>
                
                <div id="nav"></div>
                
                <div class="led-controls">
                    <form action="/led" method="post">
                        <div class="row">
                            <div class="six columns">
                                <label for="pattern">Pattern:</label>
                                <select class="u-full-width" id="pattern" name="pattern">
                                    <option value="">Loading patterns...</option>
                                </select>
                            </div>
                            
                            <div class="six columns">
                                <label for="color">Color:</label>
                                <select class="u-full-width" id="color" name="color">
                                    <option value="white">White</option>
                                    <option value="red">Red</option>
                                    <option value="green">Green</option>
                                    <option value="blue">Blue</option>
                                    <option value="yellow">Yellow</option>
                                    <option value="purple">Purple</option>
                                    <option value="cyan">Cyan</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="six columns">
                                <label for="speed">Speed (ms):</label>
                                <input class="u-full-width" type="number" id="speed" name="speed" min="50" max="2000" value="500">
                            </div>
                            
                            <div class="six columns">
                                <label for="direction">Direction:</label>
                                <select class="u-full-width" id="direction" name="direction">
                                    <option value="forward">Forward</option>
                                    <option value="reverse">Reverse</option>
                                </select>
                            </div>
                        </div>
                        
                        <input class="button-primary" type="submit" value="Apply Settings">
                    </form>
                    
                    <div class="status-area">
                        <p id="status"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<script src="/js/nav.js"></script>

<script>
    // Color mapping for dropdown
    const colorNames = {
        '255,255,255': 'white',
        '255,0,0': 'red',
        '0,255,0': 'green',
        '0,0,255': 'blue',
        '255,255,0': 'yellow',
        '255,0,255': 'purple',
        '0,255,255': 'cyan'
    };

    // Reverse mapping from color name to RGB
    const colorValues = {
        'white': '255,255,255',
        'red': '255,0,0',
        'green': '0,255,0',
        'blue': '0,0,255',
        'yellow': '255,255,0',
        'purple': '255,0,255',
        'cyan': '0,255,255'
    };

    // Load available patterns from the controller
    function loadPatterns() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/led/patterns', true);
        
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                var patterns = JSON.parse(xhr.responseText);
                var select = document.getElementById('pattern');
                
                select.innerHTML = '';
                patterns.forEach(function(pattern) {
                    var option = document.createElement('option');
                    option.value = pattern;
                    // Convert pattern name to display format
                    option.text = pattern.replace(/_/g, ' ').replace(/\b\w/g, function(l) { return l.toUpperCase(); });
                    select.appendChild(option);
                });
                
                // After loading patterns, load current settings
                loadCurrentSettings();
            }
        };
        
        xhr.send();
    }

    // Load current LED settings
    function loadCurrentSettings() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/led/current', true);
        
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                var data = JSON.parse(xhr.responseText);
                
                // Set pattern
                var patternSelect = document.getElementById('pattern');
                patternSelect.value = data.pattern;
                
                // Set color - find closest match
                var colorSelect = document.getElementById('color');
                var colorStr = data.color;
                // Try exact match first
                for (var key in colorNames) {
                    if (colorNames[key] && key === colorStr) {
                        colorSelect.value = colorNames[key];
                        break;
                    }
                }
                
                // Set speed
                document.getElementById('speed').value = data.speed;
                
                // Set direction
                document.getElementById('direction').value = data.direction;
            }
        };
        
        xhr.send();
    }

    // Handle form submission feedback
    document.querySelector('form').addEventListener('submit', function(e) {
        // Allow form to submit normally, but show status after
        var form = e.target;
        var originalSubmit = form.querySelector('input[type="submit"]');
        originalSubmit.value = 'Applying...';
        originalSubmit.disabled = true;
    });

    // If page is loaded via form submission, show status
    window.onload = function() {
        loadPatterns();
    };
</script>
