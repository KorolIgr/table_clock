<!DOCTYPE html>
<html>
<head>
    <title>Table Clock - LED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/normalize.css">
    <link rel="stylesheet" href="/css/skeleton.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="twelve columns">
                <h1>LED Settings</h1>
                
                <div id="nav"></div>
                
                <div class="led-controls">
                    <form action="/led" method="post">
                        <div class="row">
                            <div class="six columns">
                                <label for="pattern">Pattern:</label>
                                <select class="u-full-width" id="pattern" name="pattern">
                                    <option value="">Loading patterns...</option>
                                </select>
                            </div>
                            
                            <div class="six columns">
                                <label for="color">Color:</label>
                                <input class="u-full-width" type="color" id="color" name="color" value="#141414">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="six columns">
                                <label for="speed">Speed (ms):</label>
                                <input class="u-full-width" type="number" id="speed" name="speed" min="50" max="2000" value="500">
                            </div>
                            
                            <div class="six columns">
                                <label for="direction">Direction:</label>
                                <select class="u-full-width" id="direction" name="direction">
                                    <option value="forward">Forward</option>
                                    <option value="reverse">Reverse</option>
                                </select>
                            </div>
                        </div>
                        
                        <input class="button-primary" type="submit" value="Apply Settings">
                    </form>
                    
                    <div class="status-area">
                        <p id="status"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<script src="/js/nav.js"></script>

<script>
    // Convert hex color to RGB string
    function hexToRgb(hex) {
        // Remove # if present
        hex = hex.replace(/^#/, '');
        // Parse r, g, b values
        var r = parseInt(hex.substring(0, 2), 16);
        var g = parseInt(hex.substring(2, 4), 16);
        var b = parseInt(hex.substring(4, 6), 16);
        return r + ',' + g + ',' + b;
    }

    // Convert RGB string to hex
    function rgbToHex(r, g, b) {
        function toHex(n) {
            var hex = n.toString(16);
            return hex.length === 1 ? '0' + hex : hex;
        }
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }

    // Load available patterns from the controller
    function loadPatterns() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/led/patterns', true);
        
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                var patterns = JSON.parse(xhr.responseText);
                var select = document.getElementById('pattern');
                
                select.innerHTML = '';
                patterns.forEach(function(pattern) {
                    var option = document.createElement('option');
                    option.value = pattern;
                    // Convert pattern name to display format
                    option.text = pattern.replace(/_/g, ' ').replace(/\b\w/g, function(l) { return l.toUpperCase(); });
                    select.appendChild(option);
                });
                
                // After loading patterns, load current settings
                loadCurrentSettings();
            }
        };
        
        xhr.send();
    }

    // Load current LED settings
    function loadCurrentSettings() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/led/current', true);
        
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                var data = JSON.parse(xhr.responseText);
                
                // Set pattern
                var patternSelect = document.getElementById('pattern');
                patternSelect.value = data.pattern;
                
                // Set color picker from RGB string
                var colorPicker = document.getElementById('color');
                var colorStr = data.color;
                var rgb = colorStr.split(',');
                if (rgb.length === 3) {
                    colorPicker.value = rgbToHex(parseInt(rgb[0]), parseInt(rgb[1]), parseInt(rgb[2]));
                }
                
                // Set speed
                document.getElementById('speed').value = data.speed;
                
                // Set direction
                document.getElementById('direction').value = data.direction;
            }
        };
        
        xhr.send();
    }

    // Handle form submission via AJAX
    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent normal form submission
        
        var form = e.target;
        var submitBtn = form.querySelector('input[type="submit"]');
        var originalValue = submitBtn.value;
        submitBtn.value = 'Applying...';
        submitBtn.disabled = true;
        
        // Get form data
        var pattern = document.getElementById('pattern').value;
        var color = document.getElementById('color').value; // hex format
        var speed = document.getElementById('speed').value;
        var direction = document.getElementById('direction').value;
        
        // Convert color from hex to RGB string for backend
        var colorRgb = hexToRgb(color);
        
        // Build POST data
        var postData = 'pattern=' + encodeURIComponent(pattern) +
                      '&color=' + encodeURIComponent(colorRgb) +
                      '&speed=' + encodeURIComponent(speed) +
                      '&direction=' + encodeURIComponent(direction);
        
        // Send AJAX request
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/led', true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                submitBtn.value = originalValue;
                submitBtn.disabled = false;
                
                var statusEl = document.getElementById('status');
                if (xhr.status === 200) {
                    statusEl.innerHTML = '<span style="color: green;">Settings applied successfully!</span>';
                    // Reload current settings after a short delay to confirm
                    setTimeout(loadCurrentSettings, 500);
                } else {
                    statusEl.innerHTML = '<span style="color: red;">Error: ' + xhr.responseText + '</span>';
                }
                
                // Clear status after 5 seconds
                setTimeout(function() {
                    statusEl.innerHTML = '';
                }, 5000);
            }
        };
        
        xhr.send(postData);
    });

    // If page is loaded via form submission, show status
    window.onload = function() {
        loadPatterns();
    };
</script>
