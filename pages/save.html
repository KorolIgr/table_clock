<!DOCTYPE html>
<html>
<head>
    <title>Table Clock - Save</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/normalize.css">
    <link rel="stylesheet" href="/css/skeleton.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="twelve columns">
                <h1>Save</h1>
                
                <div id="nav"></div>
                
                
                <button class="button u-full-width" type="button" onclick="confirmSave(event)">Save</button>
                
            </div>
        </div>
    </div>
</body>
</html>

<script>
        
    function confirmSave(event) {
        event.preventDefault(); // чтобы кнопка не отправляла форму или не перезагружала страницу
        if (confirm("Вы уверены, что хотите сохранить изменения?")) {
            // здесь выполняем действие сохранения
            alert("Сохранено!"); // временно, замените на реальный код сохранения
        }
    }
</script>

<script src="/js/nav.js"></script>
