; PlatformIO Project Configuration File
; Table Clock Project - ESP8266 with SSD1306 displays and APA106 LEDs

[env:esp8266]
platform = espressif8266
board = esp12e
framework = arduino

; Serial monitor settings
monitor_speed = 115200
monitor_filters = esp8266_exception_decoder

; Build flags
build_flags =
    -D LED_PIN=15
    -D LED_COUNT=8
    -D TCA9548A_ADDR=0x70
    -D SSD1306_ADDR=0x3C
    -D SDA_PIN=4
    -D SCL_PIN=5
    ; Stage 4: WiFi settings
    -D WIFI_AP_SSID=\"TableClock-Setup\"
    -D WIFI_AP_PASSWORD=\"12345678\"
    -D WIFI_AP_CHANNEL=6
    -D WIFI_CONNECT_TIMEOUT_MS=15000
    -D WIFI_RECONNECT_INTERVAL_MS=30000
    -D WIFI_MAX_RETRIES=5
    -D WIFI_EEPROM_START_ADDR=0
    -D WIFI_EEPROM_SIZE=512
    -D WIFI_WEB_SERVER_PORT=80
    -D WIFI_DNS_PORT=53

; Upload settings
upload_speed = 115200

; Flash filesystem (for future use)
board_build.filesystem = littlefs

; Library dependencies
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    ; ESP8266WebServer, DNSServer, EEPROM are part of the ESP8266 Arduino framework
    ; No additional lib_deps needed for Stage 4
